---
layout: default
---

<main class="page">

  {% if page.cover %}
  <div class="post-cover">
    <img src="{{ page.cover | relative_url }}" alt="{{ page.title }}">
  </div>
  {% endif %}

  <article class="post-preview">
    <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
    <h2>{{ page.title }}</h2>

    {{ content }}

  </article>

</main>
